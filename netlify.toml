[build]
  base    = "lovable-project-e8950dcd-ba0f-4c25-9abf-b9a85a4d663f-2026-03-15"
  command = "npm run build"
  publish = "lovable-project-e8950dcd-ba0f-4c25-9abf-b9a85a4d663f-2026-03-15/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: all routes serve index.html (required for React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
